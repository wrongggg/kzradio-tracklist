<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הקצה | מחולל רשימות השמעה</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-bg: #111111;
            --input-bg: #1a1a1a;
            --kz-red: #ff2b42;
            --kz-red-hover: #e02035;
            --border-color: #2a2a2a;
            --text-white: #ffffff;
            --text-muted: #888888;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            text-align: right;
            direction: rtl;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        /* Official KZradio Header */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 25px;
            margin-bottom: 30px;
            text-align: center;
        }

        .brand-logo-text {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-white);
            margin: 0;
            line-height: 1;
            font-family: Arial Black, "Arial Bold", sans-serif;
        }

        .brand-tag {
            background: var(--kz-red);
            color: var(--text-white);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        .form-group { margin-bottom: 22px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-align: right;
        }

        input[type="file"], input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-white);
            box-sizing: border-box;
            font-size: 14px;
            text-align: right;
            direction: rtl;
        }

        input[type="file"]::file-selector-button {
            background: var(--border-color);
            color: var(--text-white);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            margin-left: 10px;
            cursor: pointer;
        }

        input[type="file"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--kz-red);
        }

        /* Advanced Settings Accordion */
        details {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 14px;
            margin-bottom: 22px;
        }

        summary {
            cursor: pointer;
            font-weight: 700;
            color: var(--text-white);
            user-select: none;
            font-size: 14px;
            text-align: right;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        button {
            width: 100%;
            background: var(--kz-red);
            color: var(--text-white);
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--kz-red-hover);
        }

        button:disabled {
            background: #333333;
            color: #666666;
            cursor: not-allowed;
        }

        /* Progress Bar */
        .progress-box {
            display: none;
            margin-top: 25px;
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: var(--input-bg);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-top: 8px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--kz-red);
            transition: width 0.3s ease;
        }

        /* Processing Spinner Animation */
        .processing-indicator {
            display: none;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            color: var(--kz-red);
            font-weight: 700;
            font-size: 14px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 43, 66, 0.2);
            border-radius: 50%;
            border-top-color: var(--kz-red);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .output-section { margin-top: 30px; }

        textarea {
            width: 100%;
            height: 220px;
            background: var(--input-bg);
            color: var(--text-white);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 14px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
            box-sizing: border-box;
            resize: vertical;
            direction: ltr;
            text-align: left;
        }

        .btn-secondary {
            background: #222222;
            color: var(--text-white);
            border: 1px solid var(--border-color);
            margin-top: 10px;
            font-size: 14px;
            font-weight: 700;
        }

        .btn-secondary:hover {
            background: #333333;
            border-color: var(--kz-red);
        }

        /* Hidden Log Details */
        .log-details {
            margin-top: 25px;
            background: transparent;
            border: none;
            padding: 0;
        }

        .log-details summary {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            text-decoration: underline;
        }

        .log-details summary:hover {
            color: var(--text-white);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1 class="brand-logo-text">הקצה</h1>
        <div class="brand-tag">מחולל רשימות השמעה / Tracklist Generator</div>
    </div>

    <form id="uploadForm">
        <div class="form-group">
            <label>בחירת קובץ התוכנית (.mp3, .m4a, .wav)</label>
            <input type="file" id="fileInput" name="audio_file" accept="audio/*" required>
        </div>

        <details>
            <summary>⚙️ הגדרות סריקה מתקדמות</summary>
            <div class="settings-grid">
                <div>
                    <label>מרווח סריקה (דקות)</label>
                    <input type="number" name="interval" value="1.5" step="0.5" min="0.5">
                </div>
                <div>
                    <label>אורך דגימה (שניות)</label>
                    <input type="number" name="snippet" value="25" step="5" min="10">
                </div>
                <div>
                    <label>ניסיונות חוזרים</label>
                    <input type="number" name="retries" value="2" min="0" max="4">
                </div>
            </div>
        </details>

        <button type="submit" id="submitBtn">צור רשימת השמעה</button>
    </form>

    <div class="progress-box" id="progressBox">
        <label id="uploadStatusText" style="font-size:13px; font-weight:700;">מעלה קובץ: 0%</label>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <div class="processing-indicator" id="processingIndicator">
        <div class="spinner"></div>
        <span id="scanStatusText">מזהה שירים דרך Shazam... בתהליך סריקה (0%)</span>
    </div>

    <div class="output-section">
        <label>Tracklist הנקי (Artist - Title)</label>
        <textarea id="cleanOutput" readonly placeholder="הרשימה הנקייה תופיע כאן..."></textarea>
        <button class="btn-secondary" onclick="copyCleanTracklist()">העתק רשימה נקייה</button>
    </div>

    <details class="log-details">
        <summary>📋 הצג יומן סריקה מלא (Full Logs)</summary>
        <div style="margin-top: 12px;">
            <textarea id="logOutput" readonly placeholder="לוג הסריקה המלא יופיע כאן..." style="height: 140px; color: var(--text-muted);"></textarea>
        </div>
    </details>
</div>

<script>
    let pollInterval = null;

    document.getElementById("uploadForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const fileInput = document.getElementById("fileInput");
        if (!fileInput.files.length) return;

        const btn = document.getElementById("submitBtn");
        const progressBox = document.getElementById("progressBox");
        const progressFill = document.getElementById("progressFill");
        const uploadStatusText = document.getElementById("uploadStatusText");
        const processingIndicator = document.getElementById("processingIndicator");
        const scanStatusText = document.getElementById("scanStatusText");
        const cleanOut = document.getElementById("cleanOutput");
        const logOut = document.getElementById("logOutput");
        
        if (pollInterval) clearInterval(pollInterval);

        btn.disabled = true;
        cleanOut.value = "";
        logOut.value = "";
        progressFill.style.width = "0%";
        uploadStatusText.innerText = "מעלה קובץ: 0%";
        progressBox.style.display = "block";
        processingIndicator.style.display = "none";

        const formData = new FormData(this);
        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener("progress", function(e) {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                progressFill.style.width = percent + "%";
                uploadStatusText.innerText = `מעלה קובץ: ${percent}%`;
            }
        });

        xhr.addEventListener("load", function() {
            if (xhr.status === 200) {
                const data = JSON.parse(xhr.responseText);
                const jobId = data.job_id;
                
                progressBox.style.display = "none";
                processingIndicator.style.display = "flex";
                scanStatusText.innerText = "מתחיל סריקת Shazam... (0%)";

                // Poll job status every 2.5 seconds
                pollInterval = setInterval(() => {
                    fetch(`/status/${jobId}`)
                        .then(res => res.json())
                        .then(job => {
                            if (job.status === "processing") {
                                scanStatusText.innerText = `מזהה שירים דרך Shazam... סורק: ${job.progress}%`;
                            } else if (job.status === "completed") {
                                clearInterval(pollInterval);
                                processingIndicator.style.display = "none";
                                btn.disabled = false;
                                cleanOut.value = job.clean_tracklist;
                                logOut.value = job.logs;
                            } else if (job.status === "failed") {
                                clearInterval(pollInterval);
                                processingIndicator.style.display = "none";
                                btn.disabled = false;
                                alert("שגיאה בסריקה: " + job.error);
                            }
                        })
                        .catch(() => {});
                }, 2500);

            } else {
                processingIndicator.style.display = "none";
                btn.disabled = false;
                alert("שגיאה בהעלאת הקובץ לשרת.");
            }
        });

        xhr.addEventListener("error", function() {
            processingIndicator.style.display = "none";
            btn.disabled = false;
            alert("שגיאת תקשורת/רשת בעת העלאת הקובץ.");
        });

        xhr.open("POST", "/process");
        xhr.send(formData);
    });

    function copyCleanTracklist() {
        const text = document.getElementById("cleanOutput").value;
        if (text) {
            navigator.clipboard.writeText(text);
            alert("רשימת השירים הועתקה ללוח!");
        }
    }
</script>

</body>
</html>
