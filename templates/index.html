<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Show Tracklist Auto-Generator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { margin-top: 0; color: #38bdf8; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #94a3b8; }
        input[type="file"], input[type="number"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        button { width: 100%; background: #0284c7; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:hover { background: #0369a1; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .output-section { margin-top: 30px; }
        textarea { width: 100%; height: 220px; background: #0f172a; color: #38bdf8; border: 1px solid #334155; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 13px; box-sizing: border-box; resize: vertical; }
        .btn-secondary { background: #334155; margin-top: 10px; font-size: 14px; }
        .btn-secondary:hover { background: #475569; }
        #status { margin-top: 15px; font-weight: 600; color: #f59e0b; }
    </style>
</head>
<body>
<div class="container">
    <h1>Radio Show Tracklist Generator</h1>
    <form id="uploadForm">
        <div class="form-group">
            <label>Upload Radio Recording (.mp3, .m4a, .wav)</label>
            <input type="file" name="audio_file" accept="audio/*" required>
        </div>
        <div class="settings-grid form-group">
            <div>
                <label>Sample Every (mins)</label>
                <input type="number" name="interval" value="1.5" step="0.5" min="0.5">
            </div>
            <div>
                <label>Snippet Secs</label>
                <input type="number" name="snippet" value="25" step="5" min="10">
            </div>
            <div>
                <label>Max Retries</label>
                <input type="number" name="retries" value="2" min="0" max="4">
            </div>
        </div>
        <button type="submit" id="submitBtn">Generate Tracklist</button>
    </form>
    <div id="status"></div>
    <div class="output-section">
        <label>Clean Tracklist (Artist - Title)</label>
        <textarea id="cleanOutput" readonly placeholder="Your clean tracklist will appear here..."></textarea>
        <button class="btn-secondary" onclick="copyCleanTracklist()">Copy Clean Tracklist</button>
    </div>
    <div class="output-section">
        <label>Full Scan Logs</label>
        <textarea id="logOutput" readonly placeholder="Detailed Shazam scan logs will appear here..." style="height: 120px; color: #94a3b8;"></textarea>
    </div>
</div>
<script>
    document.getElementById("uploadForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        const status = document.getElementById("status");
        const cleanOut = document.getElementById("cleanOutput");
        const logOut = document.getElementById("logOutput");
        
        btn.disabled = true;
        status.innerText = "Processing audio show... This takes ~1-2 minutes for a 2hr file.";
        cleanOut.value = "";
        logOut.value = "";

        const formData = new FormData(this);
        try {
            const response = await fetch("/process", { method: "POST", body: formData });
            const data = await response.json();
            if (response.ok) {
                cleanOut.value = data.clean_tracklist;
                logOut.value = data.logs;
                status.innerText = "✓ Processing complete!";
            } else {
                status.innerText = "❌ Error: " + (data.error || "Failed to process");
            }
        } catch (err) {
            status.innerText = "❌ Server communication error.";
        } finally {
            btn.disabled = false;
        }
    });

    function copyCleanTracklist() {
        const text = document.getElementById("cleanOutput").value;
        if (text) {
            navigator.clipboard.writeText(text);
            alert("Clean tracklist copied to clipboard!");
        }
    }
</script>
</body>
</html>
