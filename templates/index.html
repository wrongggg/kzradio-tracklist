<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZradio | Tracklist Generator</title>
    <style>
        :root {
            --bg-dark: #0a0c10;
            --card-bg: #141923;
            --input-bg: #0d1117;
            --accent-cyan: #00f0ff;
            --accent-hover: #00c8d6;
            --border-color: #212936;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --warning-gold: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 820px;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* KZradio Header Branding */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .brand-logo-text {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .brand-logo-text span {
            color: var(--accent-cyan);
        }

        .brand-tag {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 240, 255, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 22px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="file"], input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input[type="file"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        /* Advanced Settings Accordion */
        details {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 22px;
        }

        summary {
            cursor: pointer;
            font-weight: 600;
            color: var(--accent-cyan);
            user-select: none;
            font-size: 14px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        button {
            width: 100%;
            background: var(--accent-cyan);
            color: #000;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background: #2b3544;
            color: #64748b;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress Bar Styles */
        .progress-box {
            display: none;
            margin-top: 25px;
        }

        .progress-track {
            width: 100%;
            height: 10px;
            background: var(--input-bg);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-top: 8px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-cyan);
            transition: width 0.2s ease;
        }

        /* Processing Indicator & Spinner Animation */
        .processing-indicator {
            display: none;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            color: var(--warning-gold);
            font-weight: 600;
            font-size: 14px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(245, 158, 11, 0.2);
            border-radius: 50%;
            border-top-color: var(--warning-gold);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .output-section { margin-top: 30px; }

        textarea {
            width: 100%;
            height: 220px;
            background: var(--input-bg);
            color: var(--accent-cyan);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.5;
            box-sizing: border-box;
            resize: vertical;
        }

        .btn-secondary {
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            margin-top: 10px;
            font-size: 14px;
            font-weight: 700;
        }

        .btn-secondary:hover {
            background: #2a374e;
            border-color: var(--accent-cyan);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Brand Header -->
    <div class="brand-header">
        <div class="brand-logo-text">KZ<span>radio</span></div>
        <div class="brand-tag">Tracklist Generator</div>
    </div>

    <form id="uploadForm">
        <div class="form-group">
            <label>Upload Show Recording (.mp3, .m4a, .wav)</label>
            <input type="file" id="fileInput" name="audio_file" accept="audio/*" required>
        </div>

        <!-- Collapsible Settings -->
        <details>
            <summary>⚙️ Advanced Scanner Settings</summary>
            <div class="settings-grid">
                <div>
                    <label>Sample Every (mins)</label>
                    <input type="number" name="interval" value="1.5" step="0.5" min="0.5">
                </div>
                <div>
                    <label>Snippet Secs</label>
                    <input type="number" name="snippet" value="25" step="5" min="10">
                </div>
                <div>
                    <label>Max Retries</label>
                    <input type="number" name="retries" value="2" min="0" max="4">
                </div>
            </div>
        </details>

        <button type="submit" id="submitBtn">Generate Tracklist</button>
    </form>

    <!-- Upload Progress -->
    <div class="progress-box" id="progressBox">
        <label id="uploadStatusText" style="font-size:12px; font-weight:700;">Uploading Audio File: 0%</label>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- Generating Animation -->
    <div class="processing-indicator" id="processingIndicator">
        <div class="spinner"></div>
        <span>Analyzing audio via Shazam... Generating tracklist (takes ~1-2 min for full show).</span>
    </div>

    <div class="output-section">
        <label>Clean Tracklist (Artist - Title)</label>
        <textarea id="cleanOutput" readonly placeholder="Your clean tracklist will appear here..."></textarea>
        <button class="btn-secondary" onclick="copyCleanTracklist()">Copy Clean Tracklist</button>
    </div>

    <div class="output-section">
        <label>Full Scan Logs</label>
        <textarea id="logOutput" readonly placeholder="Detailed Shazam scan logs will appear here..." style="height: 120px; color: var(--text-muted);"></textarea>
    </div>
</div>

<script>
    document.getElementById("uploadForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const fileInput = document.getElementById("fileInput");
        if (!fileInput.files.length) return;

        const btn = document.getElementById("submitBtn");
        const progressBox = document.getElementById("progressBox");
        const progressFill = document.getElementById("progressFill");
        const uploadStatusText = document.getElementById("uploadStatusText");
        const processingIndicator = document.getElementById("processingIndicator");
        const cleanOut = document.getElementById("cleanOutput");
        const logOut = document.getElementById("logOutput");
        
        btn.disabled = true;
        cleanOut.value = "";
        logOut.value = "";
        progressFill.style.width = "0%";
        uploadStatusText.innerText = "Uploading Audio File: 0%";
        progressBox.style.display = "block";
        processingIndicator.style.display = "none";

        const formData = new FormData(this);
        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener("progress", function(e) {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                progressFill.style.width = percent + "%";
                uploadStatusText.innerText = `Uploading Audio File: ${percent}%`;
                
                if (percent === 100) {
                    setTimeout(() => {
                        progressBox.style.display = "none";
                        processingIndicator.style.display = "flex";
                    }, 500);
                }
            }
        });

        xhr.addEventListener("load", function() {
            processingIndicator.style.display = "none";
            btn.disabled = false;

            if (xhr.status === 200) {
                const data = JSON.parse(xhr.responseText);
                cleanOut.value = data.clean_tracklist;
                logOut.value = data.logs;
            } else {
                alert("Error processing audio file.");
            }
        });

        xhr.addEventListener("error", function() {
            processingIndicator.style.display = "none";
            btn.disabled = false;
            alert("Network error during upload/processing.");
        });

        xhr.open("POST", "/process");
        xhr.send(formData);
    });

    function copyCleanTracklist() {
        const text = document.getElementById("cleanOutput").value;
        if (text) {
            navigator.clipboard.writeText(text);
            alert("Clean tracklist copied to clipboard!");
        }
    }
</script>

</body>
</html>
